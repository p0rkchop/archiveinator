name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-monolith:
    name: Build monolith / ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14               # Apple Silicon runner
            target: aarch64-apple-darwin
            asset_name: archiveinator-darwin-aarch64
            binary: monolith

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: archiveinator-linux-x86_64
            binary: monolith

          - os: ubuntu-24.04-arm       # GitHub ARM runner
            target: aarch64-unknown-linux-musl
            asset_name: archiveinator-linux-aarch64
            binary: monolith

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: archiveinator-windows-x86_64.exe
            binary: monolith.exe

    steps:
      - name: Get latest monolith release tag
        id: monolith-tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/Y2Z/monolith/releases/latest \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" | \
            grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building monolith ${TAG}"

      - name: Checkout monolith source
        uses: actions/checkout@v4
        with:
          repository: Y2Z/monolith
          ref: ${{ steps.monolith-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl toolchain (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> "$GITHUB_ENV"

      - name: Install musl toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-monolith
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
