# archiveinator QA — paywalled site catalog
#
# Each entry has:
#   name         — human-readable label
#   url          — fallback article URL (may be stale; rss_feed takes precedence)
#   rss_feed     — (optional) RSS/Atom feed URL; if present, the test fetches the
#                  latest article from this feed at runtime instead of using url.
#                  Use this for sites whose article URLs change frequently.
#   rss_feed_needed — true if this site has no verified working RSS feed yet.
#                     Sites marked this way are SKIPPED in the TDD loop until a
#                     human adds a working rss_feed URL.
#   tags:
#     paywall_type — none | soft | metered | piano | perimeter-x | cloudflare | hard
#     category     — finance | news | tech | sports | science | magazine | entertainment | policy | uk | australia | canada | regional
#     difficulty   — easy | medium | hard
#
# Tags are overlapping so tests can slice by any dimension.

